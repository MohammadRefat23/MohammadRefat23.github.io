name: Build CV

on:
  push:
    paths:
      - 'assets/cv/**/*.tex'
      - 'assets/cv/**/*.bib'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Verify token exists
        env:
          CV_TOKEN: ${{ secrets.CV_DEPLOY_TOKEN }}
        run: |
          if [ -z "$CV_TOKEN" ]; then
            echo "CV_DEPLOY_TOKEN is empty"
            exit 1
          else
            echo "CV_DEPLOY_TOKEN is present"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CV_DEPLOY_TOKEN }}

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          working_directory: assets/cv

      - name: Commit updated PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automatically update cv.pdf"
          file_pattern: assets/cv/cv.pdf
