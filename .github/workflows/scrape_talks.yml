name: Update Talk Map

on:
  push:
    paths:
      - "_talks/**"
      - "talkmap.py"
      - ".github/workflows/scrape_talks.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-frontmatter geopy getorg

      - name: Generate talk map
        run: python talkmap.py

      - name: Commit updated map
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update talk map"